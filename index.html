<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Насколько ты редкий — Demo</title>

<!-- Telegram Web App SDK (если мини-приложение запускается внутри Telegram) -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
  :root{
    --bg:#f4f6fb;
    --card:#ffffff;
    --accent:#6c63ff;
    --muted:#7b7f91;
  }
  body{
    margin:0;
    font-family: Inter, system-ui, Arial, sans-serif;
    background: linear-gradient(180deg,#eef2ff 0%, #f7f8fb 100%);
    -webkit-font-smoothing:antialiased;
    color:#111;
    padding:24px;
    display:flex;
    justify-content:center;
  }
  .wrap{
    width:100%;
    max-width:520px;
  }
  .header{
    text-align:left;
    margin-bottom:12px;
  }
  h1{ margin:0; font-size:20px; color:#121212; }
  p.lead{ margin:6px 0 18px; color:var(--muted); font-size:14px }

  .card{
    background:var(--card);
    border-radius:16px;
    padding:16px;
    box-shadow:0 10px 30px rgba(33,36,64,0.06);
    margin-bottom:14px;
  }

  /* Question block */
  .question-title{ font-weight:600; margin-bottom:12px; }
  .opts{ display:flex; flex-direction:column; gap:10px; }
  .opt-btn{
    display:block;
    border-radius:10px;
    padding:12px 14px;
    border:1px solid #eceef7;
    background:white;
    cursor:pointer;
    text-align:left;
    font-weight:600;
  }
  .opt-btn:hover{ transform:translateY(-2px); transition:all .12s ease; }

  .progress{ margin-top:10px; color:var(--muted); font-size:13px; }

  /* Result (BuzzFeed-like) */
  .result-hero{
    display:grid;
    grid-template-columns: 120px 1fr;
    gap:16px;
    align-items:center;
  }
  .result-image{
    width:120px;
    height:120px;
    border-radius:12px;
    background-size:cover;
    background-position:center;
    box-shadow:0 8px 24px rgba(100,110,250,0.14);
  }
  /* give result-content a minimal style to avoid empty ruleset */
  .result-content{ padding-left:4px; }
  .result-label{ font-size:15px; color:var(--muted); font-weight:600; margin-bottom:6px;}
  .result-percent{ font-size:40px; font-weight:800; color:var(--accent); }
  .result-desc{ margin-top:8px; color:#4b4f63; font-size:14px; }

  .share-row{ display:flex; gap:10px; margin-top:14px; }
  .btn{
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    border:none;
    font-weight:700;
  }
  .btn-primary{ background:var(--accent); color:white; box-shadow:0 8px 20px rgba(108,99,255,0.16); }
  .btn-ghost{ background:transparent; border:1px solid #e6e7f6; color:#333; }

  /* Traits / MBTI-like */
  .traits{ margin-top:12px; display:flex; gap:8px; flex-wrap:wrap; }
  .trait-pill{ background:#f5f7ff; padding:8px 10px; border-radius:999px; font-weight:600; color:#3940a8; font-size:13px; }

  /* small helper */
  .small{ color:var(--muted); font-size:13px; }

  /* animation: subtle */
  .fade-in{ animation:fadeIn .28s ease both; }
  @keyframes fadeIn{ from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none} }
</style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <h1>Насколько ты редкий человек?</h1>
      <p class="lead">Короткий тест — 20 вопросов. Узнай, насколько ты уникален и получи совет.</p>
    </div>

    <div id="root"></div>
  </div>

<script>
/*
  Demo Mini App:
  - вопросы (20) -> начисляем очки в 5 traits
  - по завершении: считаем нормализованные значения -> main rarity (от среднего) + dominant label
  - показываем BuzzFeed-like карточку с картинкой, count-up анимацией процентов
  - показываем MBTI-like: "Ты X% интроверт" (по social trait)
  - кнопка Поделиться: открывает deeplink в Telegram (или окно)
*/

const root = document.getElementById('root');
const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;

// Replace with your backend endpoint if you want to POST results and get token/AI verdict
const BACKEND_URL = ""; // e.g. "https://abcd-1234.ngrok.io" — если пусто, вердикт генерируется локально

// BOT username for deep link sharing (replace)
const BOT_USERNAME = "YOUR_BOT_USERNAME"; // ← поменяй на своё

// --- Questions: 20 items. Каждая опция добавляет 1 к указанному trait.
const QUESTIONS = [
  {q:"Ты планируешь неделю заранее или импровизируешь?", opts:[{t:"logic", txt:"Планирую"},{t:"creativity", txt:"Импровизирую"},{t:"social", txt:"Согласуюсь с друзьями"}]},
  {q:"Как принимаешь важные решения?", opts:[{t:"logic", txt:"По фактам"},{t:"emotion", txt:"По интуиции"},{t:"social", txt:"Советуюсь с людьми"}]},
  {q:"Тебе ближе работа:", opts:[{t:"logic", txt:"Системная"},{t:"creativity", txt:"Творческая"},{t:"social", txt:"Командная"}]},
  {q:"Как ты относишься к риску?", opts:[{t:"risk", txt:"Я рискую часто"},{t:"logic", txt:"Я считаю риски"},{t:"emotion", txt:"Зависит от настроения"}]},
  {q:"На досуге ты предпочитаешь:", opts:[{t:"creativity", txt:"Творчество"},{t:"social", txt:"Встречи с друзьями"},{t:"logic", txt:"Чтение/учёба"}]},
  {q:"В споре ты обычно:", opts:[{t:"logic", txt:"Аргументирую"},{t:"emotion", txt:"От души защищаю"},{t:"social", txt:"Ищу компромисс"}]},
  {q:"Как учишься новому лучше всего?", opts:[{t:"logic", txt:"Структура и примеры"},{t:"creativity", txt:"Практика и эксперимент"},{t:"social", txt:"Через обсуждение"}]},
  {q:"Твой отпуск идеален если:", opts:[{t:"creativity", txt:"Есть искусство и приключения"},{t:"risk", txt:"Есть острые ощущения"},{t:"social", txt:"Есть компания"}]},
  {q:"Что ценишь в диалоге больше всего?", opts:[{t:"social", txt:"Эмпатию"},{t:"logic", txt:"Ясность"},{t:"emotion", txt:"Глубокие чувства"}]},
  {q:"В команде ты чаще:", opts:[{t:"social", txt:"Координатор"},{t:"logic", txt:"Планировщик"},{t:"creativity", txt:"Генератор идей"}]},
  {q:"Если нужно быстро сделать проект — ты:", opts:[{t:"risk", txt:"Иду на риск ради скорости"},{t:"logic", txt:"Сделаю план"},{t:"creativity", txt:"Придумаю фишку"}]},
  {q:"Тебя вдохновляет:", opts:[{t:"creativity", txt:"Новые идеи"},{t:"logic", txt:"изящное решение"},{t:"social", txt:"талантливые люди"}]},
  {q:"Когда дела идут плохо, ты:", opts:[{t:"emotion", txt:"переживаю"},{t:"logic", txt:"пересматриваю план"},{t:"social", txt:"ищу поддержки"}]},
  {q:"Что для тебя важнее на работе?", opts:[{t:"logic", txt:"результат"},{t:"creativity", txt:"смысл"},{t:"social", txt:"команда"}]},
  {q:"Ты предпочитаешь задачи:", opts:[{t:"creativity", txt:"творческие"},{t:"logic", txt:"структурированные"},{t:"risk", txt:"экспериментальные"}]},
  {q:"Как бы тебя описали друзья?", opts:[{t:"social", txt:"общительный"},{t:"logic", txt:"организованный"},{t:"creativity", txt:"странный(ая) в хорошем смысле"}]},
  {q:"Тебя заводит:", opts:[{t:"risk", txt:"вызов"},{t:"creativity", txt:"создание нового"},{t:"social", txt:"влияние на людей"}]},
  {q:"Предпочитаешь команду:", opts:[{t:"social", txt:"слаженную"},{t:"logic", txt:"эффективную"},{t:"creativity", txt:"свободную"}]},
  {q:"Что для тебя успех?", opts:[{t:"logic", txt:"чёткий результат"},{t:"emotion", txt:"внутреннее удовлетворение"},{t:"social", txt:"признание"}]},
  {q:"Какое хобби выберешь?", opts:[{t:"creativity", txt:"искусство"},{t:"risk", txt:"экстрим"},{t:"logic", txt:"шахматы"}]}
];

let idx = 0;
const total = QUESTIONS.length;
const vector = {logic:0, emotion:0, social:0, creativity:0, risk:0};

function renderQuestion(){
  const Q = QUESTIONS[idx];
  root.innerHTML = `
    <div class="card fade-in">
      <div class="question-title">Вопрос ${idx+1} из ${total}</div>
      <div class="question-title">${escapeHtml(Q.q)}</div>
      <div class="opts" id="opts"></div>
      <div class="progress small">Прогресс: ${idx+1}/${total}</div>
    </div>
  `;
  const opts = document.getElementById('opts');
  Q.opts.forEach((o, i) => {
    const b = document.createElement('button');
    b.className = 'opt-btn';
    b.innerText = o.txt;
    b.onclick = () => choose(i);
    opts.appendChild(b);
  });
}

function choose(optionIndex){
  const t = QUESTIONS[idx].opts[optionIndex].t;
  vector[t] = (vector[t]||0) + 1;
  idx++;
  if(idx >= total){
    computeAndShow();
  } else {
    renderQuestion();
  }
}

function computeAndShow(){
  // normalize 0..1
  const norm = {};
  for(const k of Object.keys(vector)){
    norm[k] = (vector[k] || 0) / total;
  }

  // compute rarity: distance from mean(0.5)
  // same as backend algorithm but local for instant UI
  const mean = 0.5;
  const v = [norm.logic, norm.emotion, norm.social, norm.creativity, norm.risk];
  let dist = 0;
  for (let i=0;i<v.length;i++){
    dist += (v[i]-mean)*(v[i]-mean);
  }
  dist = Math.sqrt(dist);
  const maxDist = Math.sqrt(5*(0.5*0.5)); // ~1.118...
  const normDist = dist / maxDist;
  const rarity = Math.pow(normDist, 0.7);
  const rarityPercent = Math.round(rarity*1000)/10; // one decimal

  // Determine dominant trait label
  const entries = Object.entries(norm).sort((a,b)=>b[1]-a[1]);
  const dominant = entries[0][0];
  const labelMap = {
    logic:"Стратег-аналитик",
    emotion:"Чувственный эмпат",
    social:"Командный лидер",
    creativity:"Креативный новатор",
    risk:"Рискованный первопроходец"
  };
  const label = labelMap[dominant] || "Уникальная личность";

  // MBTI-like: introversion % as inverse of social trait
  // introversionPercent = (1 - social_norm) * 100, rounded
  const introversionPercent = Math.round((1 - (norm.social||0)) * 100);

  // local AI-verdict fallback if no backend
  let aiVerdict = "Краткий совет: используй свои сильные стороны (" + label.toLowerCase() + ").";

  // If BACKEND_URL is set, send normalized vector to backend to compute + store + get token+ai_verdict
  if (BACKEND_URL){
    showLoading();
    fetch(BACKEND_URL + '/api/compute', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ vector: norm })
    }).then(r=>r.json()).then(data=>{
      showResultBlock(data, introversionPercent);
    }).catch(e=>{
      console.warn('backend error',e);
      showResultBlock({label, rarity_percent:rarityPercent, people_like_you:"1 из " + Math.max(1,Math.round(1/(1-rarity || 0.001))), ai_verdict: aiVerdict, token: null}, introversionPercent);
    });
  } else {
    // local-only -> build fake people_like_you
    const peopleLike = "1 из " + Math.max(1, Math.round(1/(1-rarity || 0.001)));
    showResultBlock({label, rarity_percent:rarityPercent, people_like_you:peopleLike, ai_verdict:aiVerdict, token:null}, introversionPercent);
  }
}

// show "loading" intermediate card
function showLoading(){
  root.innerHTML = '<div class="card"><div class="small">Считаем…</div></div>';
}

// show result block (BuzzFeed-like)
function showResultBlock(data, introversionPercent){
  // pick an image based on dominant label (simple logic)
  const img = pickImageByLabel(data.label);

  // build HTML + animate count-up
  root.innerHTML = `
    <div class="card result-hero fade-in">
      <div class="result-image" id="heroImg" style="background-image:url('${img}');"></div>
      <div class="result-content">
        <div class="result-label">Тип: ${escapeHtml(data.label)}</div>
        <div class="result-percent" id="countUp">0%</div>
        <div class="small">${escapeHtml(data.people_like_you)}</div>
        <div class="result-desc" id="aiVerdict">${escapeHtml(data.ai_verdict || '')}</div>
        <div class="traits" id="traitsRow"></div>
        <div class="share-row">
          <button class="btn btn-primary" id="shareBtn">Поделиться</button>
          <button class="btn btn-ghost" id="closeBtn">Закрыть</button>
        </div>
      </div>
    </div>
  `;

  // traits pills: show normalized trait percents
  const traitEls = document.getElementById('traitsRow');
  // compute simple percentages from vector normalized by total
  const totalAnswers = total;
  const vnorm = {};
  for(const k of Object.keys(vector)){
    vnorm[k] = Math.round((vector[k]||0) / totalAnswers * 100);
  }
  // show top 3 traits
  Object.entries(vnorm).sort((a,b)=>b[1]-a[1]).slice(0,3).forEach(([k,val])=>{
    const pill = document.createElement('div');
    pill.className = 'trait-pill';
    pill.innerText = mapTraitName(k) + ' · ' + val + '%';
    traitEls.appendChild(pill);
  });

  // MBTI-like text
  const mbtiPill = document.createElement('div');
  mbtiPill.className = 'trait-pill';
  mbtiPill.innerText = 'Ты ' + introversionPercent + '% интроверт';
  traitEls.appendChild(mbtiPill);

  // animate count up to rarity_percent
  animateCountUp('countUp', 0, Number(data.rarity_percent || 0));

  // share button
  document.getElementById('shareBtn').onclick = () => {
    // if backend returned token — share deeplink with token, else share simple text
    const token = data.token || null;
    const shareText = 'Я редче ' + data.rarity_percent + '% людей — ' + data.label + '. Проверь себя!';
    if (token && BOT_USERNAME && BOT_USERNAME !== 'YOUR_BOT_USERNAME'){
      const url = 'https://t.me/' + BOT_USERNAME + '?start=' + token;
      openLink(url);
    } else {
      // fallback: native share or copy
      if (navigator.share) {
        navigator.share({title:'Мой результат', text:shareText});
      } else {
        copyToClipboard(shareText);
        alert('Результат скопирован в буфер обмена:\n' + shareText);
      }
    }
  };

  document.getElementById('closeBtn').onclick = () => {
    if (tg && tg.close) tg.close();
    else root.innerHTML = '<div class="card"><div class="small">Спасибо! Вернись позже.</div></div>';
  };
}

// helper: animate numeric count-up
function animateCountUp(elId, start, end){
  const el = document.getElementById(elId);
  const duration = 900; // ms
  const startTime = performance.now();
  function step(now){
    const t = Math.min(1, (now - startTime) / duration);
    // easeOutCubic
    const eased = 1 - Math.pow(1 - t, 3);
    const current = Math.round((start + (end - start) * eased) * 10) / 10;
    el.innerText = (current % 1 === 0 ? current.toFixed(0) : current.toFixed(1)) + '%';
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

// small util: pick image by label (uses Unsplash — free hotlinking for demo)
function pickImageByLabel(label){
  label = (label || '').toLowerCase();
  if(label.includes('стратег')) return 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=800&q=60';
  if(label.includes('эмпат')) return 'https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&w=800&q=60';
  if(label.includes('команд')) return 'https://images.unsplash.com/photo-1522071820081-009f0129c71c?auto=format&fit=crop&w=900&q=60';
  if(label.includes('креатив')) return 'https://images.unsplash.com/photo-1496317899792-9d7dbcd928a1?auto=format&fit=crop&w=800&q=60';
  if(label.includes('риск')) return 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=800&q=60';
  return 'https://images.unsplash.com/photo-1531123414780-fc8a5f7d4b8a?auto=format&fit=crop&w=800&q=60';
}

function mapTraitName(k){
  return {
    logic:'Аналитика',
    emotion:'Эмоции',
    social:'Общение',
    creativity:'Креатив',
    risk:'Риск'
  }[k] || k;
}

function escapeHtml(s){
  if(!s) return '';
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function openLink(url){
  if (tg && typeof tg.openLink === 'function') tg.openLink(url);
  else window.open(url, '_blank');
}

function copyToClipboard(text){
  try {
    navigator.clipboard.writeText(text);
  } catch (e) {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); ta.remove();
  }
}

// initial render
renderQuestion();

</script>
</body>
</html>
